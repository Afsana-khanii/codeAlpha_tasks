<!DOCTYPE html>
<html>
<head>
    <title>Create Post</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="container">

    <div class="form-card">
        <h2 class="form-title">Create Post</h2>

        <form method="POST" enctype="multipart/form-data" class="post-form">
            {% csrf_token %}
            {{ form.as_p }}

            <button type="submit" class="btn submit-btn">Post</button>
        </form>

        <a href="{% url 'home' %}" class="back-link">← Back to Feed</a>
    </div>

</div>

</body>
</html>
